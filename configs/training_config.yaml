# SUCF Training Configuration - V14 Single Stage
# V14 settings: lr=3.1e-5, wd=0.01, dropout=0.1

paths:
  data_root: /home/20T-1/fyh0106/compare/merged_amp_decoy/
  checkpoint_dir: ./outputs/checkpoints
  log_dir: ./outputs/logs

data:
  extra_embeddings:
    esm_amp:
      attr: amp_embedding
      path: /home/20T-1/fyh0106/compare/merged_amp_decoy/embeddings/amp_embedding
      type: file
    protbert:
      attr: protbert_embedding
      path: /home/20T-1/fyh0106/compare/merged_amp_decoy/embeddings/protbert_embedding
      type: file
    one_hot:
      attr: one_hot_embedding
      type: one_hot_from_x
      dim: 21

# Random seed
random_seed: 37

# Model architecture
model:
  architecture:
    hidden_dim: 512
    dropout: 0.1
    gvp_layers: 2
    rgat_layers: 3
    rgat_heads: 16
    cross_attention_heads: 16
    mamba_layers: 2
    mamba_d_state: 8
    mamba_d_conv: 4
    mamba_expand: 2
    laplacian_k: 16
    node_scalar_dim: 22
    node_vector_dim: 1
    edge_scalar_dim: 10

  esm:
    base_model_name_or_path: facebook/esm2_t36_3B_UR50D

  sequence_inputs:
    esm:
      attr: amp_embedding
      in_dim: 2560
    protbert:
      attr: protbert_embedding
      in_dim: 1024
    one_hot:
      attr: one_hot_embedding
      in_dim: 21

# Training - V14 single stage settings
training:
  device: cuda:0
  batch_size: 64
  num_workers: 4
  pin_memory: true

  loss_config:
    alignment_contrastive_temperature: 0.1
    supervised_contrastive_temperature: 0.07
    use_focal_loss: false
    label_smoothing: 0.0

  optimizer_params:
    type: AdamW
    weight_decay: 0.01

  scheduler_params:
    scheduler_type: cosine_annealing
    min_lr_factor: 0.01
